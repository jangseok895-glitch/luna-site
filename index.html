<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>루칭방 군표 1차 풀버전</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"/>

<style>
:root{
  --bg:#eaf8ff;
  --card:#ffffff;
  --line:rgba(14,165,233,.28);
  --blue:#38bdf8;
  --blue2:#0284c7;
  --text:#111827;
  --muted:#64748b;
  --gold:#ffd54f;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  font-family:"Pretendard Variable",system-ui,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.95), transparent 35%),
    linear-gradient(180deg,#eaf8ff 0%,#cdefff 45%,#ffffff 100%);
  color:var(--text);
}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:14px 14px 50px;
}
.top{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(234,248,255,.96);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.top-inner{
  max-width:1180px;
  margin:0 auto;
  padding:12px 14px;
}
.title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:28px;
  font-weight:1000;
  color:#0f172a;
}
.logo-badge{
  padding:9px 18px;
  border-radius:999px;
  background:linear-gradient(135deg,#ffffff,#b8ecff,#72d7ff);
  border:1px solid rgba(14,165,233,.35);
  box-shadow:0 4px 14px rgba(14,165,233,.22);
}
.sub{
  color:#2563eb;
  font-weight:900;
  font-size:16px;
}
.tabs{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.tab{
  flex:1;
  border:1px solid var(--line);
  border-radius:14px 14px 0 0;
  padding:13px 8px;
  background:linear-gradient(135deg,#dff6ff,#9be3ff);
  color:#0f172a;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}
.tab.active{
  background:linear-gradient(135deg,#38bdf8,#0284c7);
  color:#fff;
  transform:translateY(-2px);
}
.panel{
  background:linear-gradient(135deg,#ffffff 0%,#e4f7ff 55%,#c7efff 100%);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-top:12px;
  box-shadow:0 8px 24px rgba(14,165,233,.12);
}
.controls{
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-wrap:wrap;
}
.field{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.field label{
  font-size:13px;
  color:#334155;
  font-weight:800;
}
input,select{
  height:46px;
  border:1px solid rgba(14,165,233,.45);
  border-radius:11px;
  padding:0 12px;
  font-size:16px;
  background:#fff;
}
#nickname{width:180px}
#pin5{width:120px}
.btn{
  height:46px;
  border:0;
  border-radius:12px;
  padding:0 18px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9);
  color:#fff;
}
.btn.gold{
  background:linear-gradient(135deg,#fff7cc,#ffd54f);
  color:#111827;
}
.btn.red{
  background:linear-gradient(135deg,#ff8a8a,#ef4444);
}
.rank-box{
  margin-top:12px;
  border:2px solid #38bdf8;
  border-radius:14px;
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  box-shadow:0 0 16px rgba(56,189,248,.22);
}
.rank-text{
  color:#0284c7;
  font-size:28px;
  font-weight:1000;
  text-align:center;
}
.meter{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  overflow:hidden;
  border-radius:12px;
  margin-top:12px;
  border:1px solid rgba(14,165,233,.25);
}
.meter div{
  padding:10px 4px;
  text-align:center;
  font-weight:1000;
  font-size:14px;
  color:#111827;
}
.meter div:nth-child(1){background:#38bdf8}
.meter div:nth-child(2){background:#7dd3fc}
.meter div:nth-child(3){background:#bae6fd}
.meter div:nth-child(4){background:#bbf7d0}
.meter div:nth-child(5){background:#fef9c3}
.meter div:nth-child(6){background:#fde68a}
.meter div:nth-child(7){background:#fdba74}
.meter div:nth-child(8){background:#fb7185}
.meter div:nth-child(9){background:#fecaca}
.table-wrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:16px;
  margin-top:12px;
  background:#fff;
}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:860px;
}
th{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#dff6ff,#9be3ff);
  padding:10px 6px;
  font-size:16px;
  font-weight:1000;
  border-bottom:1px solid var(--line);
  text-align:center;
}
td{
  padding:6px 5px;
  border-bottom:1px solid rgba(14,165,233,.18);
  text-align:center;
}
.map-name{
  font-weight:1000;
  text-align:left;
  white-space:nowrap;
}
.diff{
  font-weight:900;
  border-radius:8px;
  padding:5px 8px;
  display:inline-block;
}
.diff.L1{background:#fca5a5}
.diff.L2{background:#93c5fd}
.diff.L3{background:#86efac}
.diff.ROOKIE{background:#fde68a}
.chip{
  width:100%;
  min-height:36px;
  border:1px solid rgba(0,0,0,.08);
  border-radius:8px;
  background:#bfdbfe;
  color:#111827;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}
.chip.empty{
  opacity:.25;
  cursor:default;
}
.chip.selected{
  background:#1d4ed8!important;
  color:#fff!important;
  border-color:#1e40af!important;
  box-shadow:0 0 0 3px rgba(29,78,216,.25);
}
.msg{
  white-space:pre-wrap;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#f0f9ff;
  border:1px solid rgba(14,165,233,.18);
  font-size:14px;
}
.hidden{display:none!important}
.real-placeholder{
  text-align:center;
  padding:50px 12px;
  color:#475569;
  font-weight:900;
}
@media(max-width:720px){
  .logo{font-size:22px}
  .sub{display:none}
  .tabs{gap:5px}
  .tab{font-size:14px;padding:11px 3px}
  #nickname,#pin5{width:100%}
  .field{flex:1 1 100%}
  .btn{width:100%}
  .rank-text{font-size:23px}
}
</style>
</head>

<body>
<div class="top">
  <div class="top-inner">
    <div class="title-row">
      <div class="logo">
        <span class="logo-badge">루칭방 군 계산기</span>
      </div>
      <div class="sub">Supabase 이전 1차 · 군표 저장/불러오기</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="gunpyo">군표</button>
      <button class="tab" data-tab="real">군 실명제</button>
      <button class="tab" data-tab="event">이벤트/대회</button>
      <button class="tab" data-tab="promo">홍보</button>
      <button class="tab" data-tab="qna">민원 Q/A</button>
    </div>
  </div>
</div>

<div class="wrap">

  <section id="gunpyoSection">
    <div class="panel">
      <div class="controls">
        <button class="btn gold" id="btnSave">저장하기</button>
        <button class="btn" id="btnLoad">불러오기</button>
        <button class="btn red" id="btnReset">선택 초기화</button>

        <div class="field">
          <label>닉네임</label>
          <input id="nickname" placeholder="닉네임 입력" />
        </div>

        <div class="field">
          <label>비밀번호 5자리</label>
          <input id="pin5" placeholder="12345" maxlength="5" inputmode="numeric" />
        </div>
      </div>

      <div class="rank-box">
        <div id="rankText" class="rank-text">선택된 기록이 없습니다</div>
      </div>

      <div class="meter">
        <div>프로</div><div>강주력</div><div>주력</div><div>1군</div><div>2군</div><div>3군</div><div>4군</div><div>5군</div><div>6군</div>
      </div>

      <div id="msg" class="msg">군표를 체크한 뒤 저장하기를 누르세요.</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:90px">난이도</th>
            <th style="width:220px">맵이름</th>
            <th>프로</th>
            <th>강주력</th>
            <th>주력</th>
            <th>1군</th>
            <th>2군</th>
            <th>3군</th>
            <th>4군</th>
            <th>5군</th>
          </tr>
        </thead>
        <tbody id="mapBody"></tbody>
      </table>
    </div>
  </section>

  <section id="realSection" class="hidden">
    <div class="panel real-placeholder">
      군 실명제는 2차에서 Supabase 연결 예정입니다.<br>
      1차는 군표 저장/불러오기부터 완성합니다.
    </div>
  </section>

  <section id="eventSection" class="hidden">
    <div class="panel real-placeholder">이벤트/대회는 3차에서 이전 예정입니다.</div>
  </section>

  <section id="promoSection" class="hidden">
    <div class="panel real-placeholder">홍보 게시판은 4차에서 이전 예정입니다.</div>
  </section>

  <section id="qnaSection" class="hidden">
    <div class="panel real-placeholder">민원 Q/A는 4차에서 이전 예정입니다.</div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ===================== Supabase 설정 ===================== */
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===================== 군 계산 설정 ===================== */
const TIERS = ["프로","강주력","주력","1군","2군","3군","4군","5군"];
const WEIGHTS = {
  "프로": 128,
  "강주력": 64,
  "주력": 32,
  "1군": 16,
  "2군": 8,
  "3군": 4,
  "4군": 2,
  "5군": 1
};

const RANKS = [
  { min: 5760, label: "당신은 프로군입니다" },
  { min: 2880, label: "당신은 강주력입니다" },
  { min: 1440, label: "당신은 주력입니다" },
  { min: 720, label: "당신은 1군입니다" },
  { min: 360, label: "당신은 2군입니다" },
  { min: 180, label: "당신은 3군입니다" },
  { min: 90, label: "당신은 4군입니다" },
  { min: 45, label: "당신은 5군입니다" },
  { min: 0, label: "당신은 6군입니다" }
];

/* 1차 임시 맵 데이터입니다.
   실제 구글시트 표 데이터와 동일하게 만들려면 2차에서 전체 맵 목록을 여기에 넣으면 됩니다. */
const MAPS = [
  { id: 1, diff:"L1", map:"월드 두바이 다운타운", times:["1:46","1:48","1:50","1:52","1:54","1:56","1:58","2:00"] },
  { id: 2, diff:"L1", map:"해적 로비 절벽의 전투", times:["1:51","1:53","1:55","1:57","1:59","2:01","2:03","2:05"] },
  { id: 3, diff:"L2", map:"빌리지 고가의 질주", times:["1:41","1:43","1:45","1:47","1:49","1:51","1:53","1:55"] },
  { id: 4, diff:"L2", map:"차이나 서안 병마용", times:["1:44","1:46","1:48","1:50","1:52","1:54","1:56","1:58"] },
  { id: 5, diff:"L3", map:"포레스트 지그재그", times:["1:38","1:40","1:42","1:44","1:46","1:48","1:50","1:52"] },
  { id: 6, diff:"L3", map:"광산 꼬불꼬불 다운힐", times:["1:25","1:27","1:29","1:31","1:33","1:35","1:37","1:39"] },
  { id: 7, diff:"ROOKIE", map:"빌리지 운하", times:["1:20","1:22","1:24","1:26","1:28","1:30","1:32","1:34"] },
  { id: 8, diff:"ROOKIE", map:"사막 피라미드 탐험", times:["1:33","1:35","1:37","1:39","1:41","1:43","1:45","1:47"] }
];

let selections = {};

function $(id){ return document.getElementById(id); }

function setMsg(text){
  $("msg").textContent = text;
}

function renderMaps(){
  const body = $("mapBody");
  body.innerHTML = "";

  MAPS.forEach(row => {
    const tr = document.createElement("tr");

    const diffTd = document.createElement("td");
    diffTd.innerHTML = `<span class="diff ${row.diff}">${row.diff === "ROOKIE" ? "루키" : row.diff}</span>`;
    tr.appendChild(diffTd);

    const mapTd = document.createElement("td");
    mapTd.className = "map-name";
    mapTd.textContent = row.map;
    tr.appendChild(mapTd);

    TIERS.forEach((tier, idx) => {
      const td = document.createElement("td");
      const btn = document.createElement("button");
      btn.className = "chip";
      btn.textContent = row.times[idx] || "";
      if(!row.times[idx]){
        btn.classList.add("empty");
      }else{
        btn.addEventListener("click", () => selectTier(row.id, row.map, tier, row.times[idx]));
      }
      btn.dataset.rowId = row.id;
      btn.dataset.tier = tier;
      td.appendChild(btn);
      tr.appendChild(td);
    });

    body.appendChild(tr);
  });

  refreshSelected();
}

function selectTier(rowId, map, tier, time){
  const key = String(rowId);
  if(selections[key] && selections[key].tier === tier){
    delete selections[key];
  }else{
    selections[key] = { map, tier, time };
  }
  refreshSelected();
  updateRank();
}

function refreshSelected(){
  document.querySelectorAll(".chip").forEach(btn => {
    const rowId = btn.dataset.rowId;
    const tier = btn.dataset.tier;
    btn.classList.toggle("selected", !!(selections[rowId] && selections[rowId].tier === tier));
  });
}

function calcTotal(){
  let total = 0;
  Object.values(selections).forEach(v => {
    total += Number(WEIGHTS[v.tier] || 0);
  });
  return total;
}

function getRankLabel(total){
  for(const r of RANKS){
    if(total >= r.min) return r.label;
  }
  return "당신은 6군입니다";
}

function updateRank(){
  const total = calcTotal();
  if(total <= 0){
    $("rankText").textContent = "선택된 기록이 없습니다";
    return;
  }
  $("rankText").textContent = `${getRankLabel(total)} · 점수 ${total}`;
}

function validateInput(){
  const nickname = $("nickname").value.trim();
  const pin5 = $("pin5").value.trim();

  if(!nickname){
    alert("닉네임을 입력하세요.");
    return null;
  }
  if(!/^[0-9]{5}$/.test(pin5)){
    alert("비밀번호는 숫자 5자리입니다.");
    return null;
  }
  return { nickname, pin5 };
}

async function saveProfile(){
  const input = validateInput();
  if(!input) return;

  const total = calcTotal();
  if(total <= 0){
    alert("군표 기록을 하나 이상 선택하세요.");
    return;
  }

  setMsg("저장 중입니다...");

  const { data, error } = await db
    .from("profiles")
    .insert([{
      nickname: input.nickname,
      pin5: input.pin5,
      total: total,
      selections: selections
    }])
    .select();

  if(error){
    setMsg("저장 실패:\n" + error.message);
    return;
  }

  setMsg(`저장 성공!\n닉네임: ${input.nickname}\n점수: ${total}\n군: ${getRankLabel(total)}`);
}

async function loadProfile(){
  const input = validateInput();
  if(!input) return;

  setMsg("불러오는 중입니다...");

  const { data, error } = await db
    .from("profiles")
    .select("*")
    .eq("nickname", input.nickname)
    .eq("pin5", input.pin5)
    .order("id", { ascending:false })
    .limit(1);

  if(error){
    setMsg("불러오기 실패:\n" + error.message);
    return;
  }

  if(!data || data.length === 0){
    setMsg("일치하는 군표가 없습니다.");
    return;
  }

  const prof = data[0];
  selections = prof.selections || {};
  refreshSelected();
  updateRank();

  setMsg(`불러오기 성공!\n닉네임: ${prof.nickname}\n점수: ${prof.total}\n군: ${getRankLabel(Number(prof.total)||0)}`);
}

function resetSelections(){
  if(!confirm("선택한 군표 기록을 초기화할까요?")) return;
  selections = {};
  refreshSelected();
  updateRank();
  setMsg("선택이 초기화되었습니다.");
}

/* ===================== 탭 ===================== */
function showTab(tab){
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  $("gunpyoSection").classList.toggle("hidden", tab !== "gunpyo");
  $("realSection").classList.toggle("hidden", tab !== "real");
  $("eventSection").classList.toggle("hidden", tab !== "event");
  $("promoSection").classList.toggle("hidden", tab !== "promo");
  $("qnaSection").classList.toggle("hidden", tab !== "qna");
}

/* ===================== 시작 ===================== */
document.addEventListener("DOMContentLoaded", () => {
  renderMaps();
  updateRank();

  $("btnSave").addEventListener("click", saveProfile);
  $("btnLoad").addEventListener("click", loadProfile);
  $("btnReset").addEventListener("click", resetSelections);

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => showTab(btn.dataset.tab));
  });
});
</script>
</body>
</html>
