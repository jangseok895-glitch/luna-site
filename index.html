<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>루칭방 군 계산기</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#eaf6ff;
}

/* 상단 */
.header{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* 버튼 */
.btn{
  padding:10px 20px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.btn.save{background:#ffd66b;}
.btn.load{background:#4cc3ff;color:#fff;}
.btn.reset{background:#ff6b6b;color:#fff;}

/* 입력 */
input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* 결과 */
.result{
  margin-top:20px;
  padding:15px;
  background:#dff1ff;
  border-radius:10px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* 그래프 */
.bar{
  margin-top:15px;
  height:40px;
  border-radius:20px;
  background:linear-gradient(to right,#4cc3ff,#7ed957,#ffe066,#ffa94d,#ff6b6b);
  position:relative;
}

.marker{
  position:absolute;
  top:50%;
  transform:translate(-50%,-50%);
  width:8px;
  height:40px;
  background:red;
  border-radius:4px;
}

/* 테이블 */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th{
  background:#bfe4ff;
}

.map-name{
  background:#ffe066;
  font-weight:bold;
}

.active{
  background:#3b82f6;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">루칭방 군 계산기</div>

<div style="padding:20px">

<input id="nickname" placeholder="닉네임">
<input id="pin" placeholder="비밀번호">

<button class="btn save" onclick="save()">저장</button>
<button class="btn load" onclick="load()">불러오기</button>
<button class="btn reset" onclick="resetAll()">초기화</button>

<div class="result" id="result">군표를 체크하세요</div>

<div class="bar">
  <div class="marker" id="marker"></div>
</div>

<table id="table">
<thead>
<tr>
<th>맵이름</th>
<th>프로</th>
<th>강주력</th>
<th>주력</th>
<th>1군</th>
<th>2군</th>
<th>3군</th>
<th>4군</th>
<th>5군</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔥 본인값 유지
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selections = {};

// 맵 불러오기
async function loadMaps(){
  const {data, error} = await db
    .from("map_records")
    .select("*")
    .order("sort_order",{ascending:true});

  if(error){
    alert("맵 데이터 불러오기 실패: " + error.message);
    console.error(error);
    return;
  }

  console.log("불러온 맵 데이터:", data);

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  if(!data || data.length === 0){
    tbody.innerHTML = `<tr><td colspan="9">맵 데이터가 없습니다.</td></tr>`;
    return;
  }

  data.forEach(row=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="map-name">${row.map_name || ""}</td>
      ${["pro","strong","main","g1","g2","g3","g4","g5"].map(tier=>`
        <td onclick="select(this,'${row.id}','${tier}')">
          ${row[tier] || ""}
        </td>
      `).join("")}
    `;

    tbody.appendChild(tr);
  });
}

// 선택
function select(td,mapId,tier){
  td.parentElement.querySelectorAll("td").forEach(e=>e.classList.remove("active"));
  td.classList.add("active");

  selections[mapId] = tier;
  updateResult();
}

// 결과 계산
function updateResult(){
  const count = Object.keys(selections).length;

  let tier = "6군";

  if(count>=20) tier="1군";
  else if(count>=15) tier="2군";
  else if(count>=10) tier="3군";
  else if(count>=5) tier="4군";

  document.getElementById("result").innerText =
    `당신은 ${tier} 입니다`;

  // 막대 위치
  const pos = {
    "1군":10,
    "2군":30,
    "3군":50,
    "4군":70,
    "5군":85,
    "6군":95
  };

  document.getElementById("marker").style.left = pos[tier]+"%";
}

// 저장
async function save(){
  const nickname = document.getElementById("nickname").value;
  const pin = document.getElementById("pin").value;

  await db.from("profiles").insert([{
    nickname,
    pin5:pin,
    selections
  }]);

  alert("저장 완료");
}

// 불러오기
async function load(){
  const nickname = document.getElementById("nickname").value;

  const {data} = await db
    .from("profiles")
    .select("*")
    .eq("nickname",nickname)
    .single();

  selections = data.selections || {};
  alert("불러오기 완료");
}

// 초기화
function resetAll(){
  selections = {};
  document.querySelectorAll("td").forEach(e=>e.classList.remove("active"));
  updateResult();
}

// 실행
loadMaps();
</script>

</body>
</html>
