<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>루칭방 테스트</title>
</head>
<body>
  <h1>루칭방 사이트 테스트</h1>
  <button onclick="testApi()">API 테스트</button>

  <script>
    async function testApi(){
      const res = await fetch("/api/test");
      const data = await res.json();
      alert(data.message);
    }
  </script>
</body>
</html>
