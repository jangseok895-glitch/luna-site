<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>루칭방 S38 군계산기</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css"/>

<style>
:root{
  --bg:#eaf8ff;
  --card:linear-gradient(135deg,#ffffff 0%,#e4f7ff 50%,#c7efff 100%);
  --line:rgba(30,80,120,.22);
  --blue:#16a9e8;
  --blue2:#0284c7;
  --sky:#aee8ff;
  --danger:#ef4444;
  --yellow:#ffea8a;
  --yellow2:#fff3b0;
  --text:#111827;
  --muted:#374151;
  --wrap:1206px;
  --header-offset:0px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{
  margin:0;
  padding:0;
  font-family:"Pretendard Variable",system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(255,255,255,.96),transparent 35%),
    linear-gradient(180deg,#eaf8ff 0%,#cdefff 46%,#ffffff 100%)!important;
}
.hidden{display:none!important}
.wrap{
  max-width:var(--wrap);
  margin:0 auto;
  padding:10px 14px 42px;
}
.sticky-top{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(235,248,255,.96)!important;
  backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(30,80,120,.18)!important;
  box-shadow:0 4px 18px rgba(14,165,233,.12);
}
.sticky-inner{
  max-width:var(--wrap);
  margin:0 auto;
  padding:9px 14px 8px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.title{
  display:flex;
  align-items:center;
  gap:12px;
}
.main-title-image{
  height:50px!important;
  width:auto;
  max-width:100%;
  object-fit:contain;
  display:block;
}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{
  border:1px solid rgba(14,165,233,.35)!important;
  background:linear-gradient(135deg,#dff6ff,#9be3ff)!important;
  color:#111827!important;
  padding:14px 18px;
  border-radius:12px;
  font-size:18px;
  font-weight:900;
  white-space:nowrap;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(14,165,233,.15);
}
.btn:hover{filter:brightness(.98)}
.btn.gold{
  background:linear-gradient(135deg,#fff7cc,#ffd95a)!important;
  color:#111827!important;
  border:1px solid #f6c742!important;
}
.btn.red{
  background:linear-gradient(135deg,#ff8a8a,#ef4444)!important;
  color:#fff!important;
  border:0!important;
}
.btn.link{
  background:rgba(255,255,255,.45)!important;
  color:#111827!important;
  border:1px dashed rgba(14,165,233,.45)!important;
}
.main-tabs{
  display:flex!important;
  gap:10px;
  margin:10px 0 8px;
  padding:10px 10px 0;
  border-radius:18px 18px 0 0;
  background:linear-gradient(180deg,#e9f8ff,#cdefff);
  border:1px solid rgba(14,165,233,.25);
  box-shadow:0 4px 14px rgba(14,165,233,.12);
}
.main-tab{
  position:relative;
  flex:1;
  border:1px solid rgba(14,165,233,.35);
  border-bottom:none;
  color:#0f172a;
  border-radius:16px 16px 0 0;
  padding:15px 8px 16px;
  font-size:18px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
  transform:translateY(1px);
}
.main-tab::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-9px;
  transform:translateX(-50%);
  width:26px;
  height:14px;
  background:inherit;
  clip-path:polygon(0 0,100% 0,50% 100%);
  border-left:1px solid rgba(14,165,233,.25);
  border-right:1px solid rgba(14,165,233,.25);
}
.main-tab[data-tab="gunpyo"]{background:linear-gradient(135deg,#38bdf8,#0ea5e9)}
.main-tab[data-tab="real"]{background:linear-gradient(135deg,#7dd3fc,#38bdf8)}
.main-tab[data-tab="eventTournament"]{background:linear-gradient(135deg,#bae6fd,#7dd3fc)}
.main-tab[data-tab="promo"]{background:linear-gradient(135deg,#dbeafe,#93c5fd)}
.main-tab[data-tab="qna"]{background:linear-gradient(135deg,#e0f2fe,#a5f3fc)}
.main-tab.active{
  color:#fff;
  border-color:#0284c7;
  transform:translateY(-4px);
  box-shadow:0 8px 18px rgba(14,165,233,.28),inset 0 1px 0 rgba(255,255,255,.75);
  z-index:2;
}
.panel{
  background:var(--card)!important;
  border:1px solid rgba(30,80,120,.22)!important;
  border-radius:14px;
  padding:12px 14px;
  margin-top:8px;
  box-shadow:0 8px 24px rgba(14,165,233,.12);
}
.controls{
  display:flex;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:12px;
}
.input-wrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.input-wrap.nick{width:190px;flex:0 0 190px}
.input-wrap.pin{width:126px;flex:0 0 126px}
.input-wrap label{
  font-size:13px;
  color:#111827!important;
  font-weight:700;
}
input{
  width:100%;
  background:#fff!important;
  color:#111827!important;
  border:1px solid rgba(14,165,233,.35)!important;
  border-radius:10px!important;
  padding:12px 10px!important;
  font-size:15px!important;
  height:50px;
}
.rank-row{
  display:flex;
  gap:12px;
  align-items:center;
  margin-top:10px;
}
.big-rank{
  flex:1;
  min-height:58px;
  padding:4px 10px;
  border:2px solid #38bdf8!important;
  border-radius:10px;
  background:linear-gradient(135deg,#ffffff,#e0f7ff)!important;
  box-shadow:0 0 16px rgba(56,189,248,.25);
  display:flex;
  align-items:center;
  justify-content:center;
}
.big-rank .rank-text{
  width:100%;
  color:#0284c7!important;
  font-size:30px;
  line-height:1.1;
  font-weight:1000;
  text-align:center;
}
.rank-emph{
  display:inline-block;
  padding:1px 10px 2px;
  margin:0 3px;
  color:#1b1400!important;
  font-size:1.05em;
  font-weight:1000;
  letter-spacing:.5px;
  background:linear-gradient(135deg,#fff7cc,#ffd54f,#ffca28)!important;
  border-radius:999px;
  box-shadow:0 1px 2px rgba(0,0,0,.25),0 0 8px rgba(255,213,79,.45);
}
.rank-meter{margin:12px 2px 0}
.meter-scale{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  height:38px;
  border-radius:12px;
  overflow:hidden;
  padding:0!important;
  background:linear-gradient(90deg,#38bdf8 0%,#7dd3fc 15%,#bae6fd 30%,#bbf7d0 45%,#fef9c3 60%,#fde68a 75%,#fdba74 90%,#fb7185 100%)!important;
  border:1px solid rgba(14,165,233,.25);
}
.meter-seg{
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent!important;
  color:#111827!important;
  font-size:17px;
  font-weight:1000;
  letter-spacing:.5px;
  text-shadow:0 1px 0 rgba(255,255,255,.6);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.35),inset 0 -2px 0 rgba(0,0,0,.10);
}
.meter-arrow{
  position:relative;
  height:0;
  margin:6px 0 2px;
  width:100%;
}
.meter-arrow::after,
.meter-arrow::before{
  content:"";
  position:absolute;
  left:var(--pos,100%);
  transform:translateX(-50%);
  transition:left .25s ease-out;
}
.meter-arrow::after{
  top:-42px;
  width:8px;
  height:38px;
  border-radius:999px;
  background:linear-gradient(to bottom,#ff6b6b,#ff1744);
  box-shadow:0 0 8px rgba(255,23,68,.9),0 0 18px rgba(255,23,68,.55);
}
.meter-arrow::before{
  top:-13px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#ff1744;
  box-shadow:0 0 12px rgba(255,23,68,.8);
}
.msg{
  margin-top:14px;
  white-space:pre-wrap;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(14,165,233,.22);
  border-radius:12px;
  padding:12px 16px;
  color:#0f172a;
  font-size:14px;
  line-height:1.45;
}
.table-wrap{
  border-radius:14px;
  border:1px solid rgba(14,165,233,.25);
  margin-top:28px;
  overflow:visible;
  background:linear-gradient(135deg,#ffffff 0%,#e4f7ff 50%,#c7efff 100%);
  padding:8px;
  box-shadow:0 8px 24px rgba(14,165,233,.10);
}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:auto;
  color:#111827!important;
}
thead th{
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(135deg,#dff6ff,#9be3ff)!important;
  color:#111827!important;
  font-size:20px;
  font-weight:1000;
  padding:12px 6px;
  white-space:nowrap;
  border-bottom:1px solid rgba(14,165,233,.3)!important;
  text-align:center;
}
thead th:first-child{border-radius:10px 0 0 0}
thead th:last-child{border-radius:0 10px 0 0}
tbody td{
  padding:3px 2px;
  border-bottom:1px solid rgba(14,165,233,.16)!important;
  font-size:15px;
  vertical-align:middle;
  text-align:center;
}
tbody tr:hover{background:rgba(186,230,253,.25)!important}
.map{
  display:block;
  width:100%;
  padding:10px 6px;
  background:#ffe98a!important;
  border:1px solid #f5c400!important;
  border-radius:7px!important;
  color:#111827!important;
  font-weight:1000;
  font-size:20px;
  text-align:center!important;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.chip{
  display:block;
  width:100%;
  min-height:44px;
  padding:6px 4px;
  border:1px solid #f5c400!important;
  border-radius:7px;
  background:#fff1a6!important;
  color:#111827!important;
  font-size:21px;
  font-weight:1000;
  line-height:1.2;
  text-align:center;
  cursor:pointer;
  user-select:none;
}
.chip.disabled{
  opacity:.45;
  pointer-events:none;
}
.chip.selected{
  background:#1d4ed8!important;
  color:#ffffff!important;
  border-color:#1e40af!important;
  box-shadow:0 0 0 3px rgba(29,78,216,.25)!important;
}
.diff-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  padding:8px 10px;
  border-radius:9px;
  color:#111827;
  font-size:18px;
  font-weight:1000;
}
.diff-L1{background:#fca5a5}
.diff-L2{background:#93c5fd}
.diff-L3{background:#86efac}
.diff-루키{background:#fde68a}
.placeholder{
  text-align:center;
  padding:70px 15px;
  font-size:22px;
  font-weight:1000;
  color:#2563eb;
}
.loading-overlay{
  position:fixed;
  inset:0;
  z-index:999999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.30);
}
.loading-box{
  background:rgba(15,23,42,.86)!important;
  color:#fff!important;
  padding:18px 30px!important;
  border-radius:14px!important;
  font-size:24px!important;
  font-weight:900!important;
  box-shadow:0 0 20px rgba(0,0,0,.45)!important;
}
@media(max-width:900px){
  .main-title-image{height:42px!important}
  .topbar{align-items:flex-start}
  .btn{font-size:16px;padding:12px 14px}
  .main-tabs{gap:6px}
  .main-tab{font-size:15px;padding:13px 4px 14px}
  .big-rank .rank-text{font-size:25px}
  .table-wrap{overflow:auto}
  table{min-width:980px}
}
@media(max-width:560px){
  .main-title-image{height:auto!important;max-height:42px;max-width:100%}
  .topbar{display:block}
  #gunpyoTopBtns{margin-top:8px}
  .input-wrap.nick,.input-wrap.pin{width:100%;flex:1 1 100%}
  .controls .btn{flex:1 1 100%}
}
</style>
</head>

<body>
<div id="loadingOverlay" class="loading-overlay hidden"><div class="loading-box">처리 중...</div></div>

<div class="sticky-top" id="stickyTop">

    <div class="topbar">
      <div class="title">

      </div>

    </div>
  </div>
</div>

<div class="wrap">
  <section id="gunpyoSection">

        <div class="controls">
          <button class="btn gold" id="btnSave" type="button">저장하기</button>

          <div class="input-wrap nick">
            <label>닉네임</label>

          <button class="btn" id="btnReset" type="button">초기화</button>
          <button class="btn" id="btnShot" type="button">스크린샷</button>
        </div>
      </div>

      <div class="rank-row">
        <div class="big-rank">
          <div class="rank-text" id="rankText">당신은 <span class="rank-emph">6군</span> 입니다</div>

      </div>

      <div class="rank-meter">
        <div class="meter-arrow" id="meterArrow"></div>
        <div class="meter-scale">
          <div class="meter-seg">프로</div>
          <div class="meter-seg">강주력</div>
          <div class="meter-seg">주력</div>
          <div class="meter-seg">1군</div>
          <div class="meter-seg">2군</div>
          <div class="meter-seg">3군</div>
          <div class="meter-seg">4군</div>
          <div class="meter-seg">5군</div>

    </div>

    <div id="pcTableSection" class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:76px">난이도</th>
            <th style="width:260px">맵이름</th>
            <th>프로</th>
            <th>강주력</th>
            <th>주력</th>
            <th>1군</th>
            <th>2군</th>
            <th>3군</th>
            <th>4군</th>
            <th>5군</th>
          </tr>
        </thead>
        <tbody id="mapBody"></tbody>
      </table>
    </div>
  </section>

  <section id="realSection" class="hidden">
    <div class="panel placeholder">군 실명제는 다음 단계에서 Supabase로 연결됩니다.</div>
  </section>
  <section id="eventTournamentSection" class="hidden">
    <div class="panel placeholder">이벤트/대회는 다음 단계에서 이전됩니다.</div>
  </section>
  <section id="promoSection" class="hidden">
    <div class="panel placeholder">홍보 게시판은 다음 단계에서 이전됩니다.</div>

  <section id="qnaSection" class="hidden">
    <div class="panel placeholder">민원Q/A는 다음 단계에서 이전됩니다.</div>
  </section>
</div>

  {id:13,diff:"L3",map:"월드 리오 다운힐",times:["1.23.29","1.24.29","1.25.29","1.26.49","1.27.79","1.29.29","1.30.79","1.32.29"]},
  {id:14,diff:"L3",map:"쥐라기 공룡 결투장",times:["1.29.29","1.30.29","1.31.29","1.32.49","1.33.79","1.35.29","1.36.79","1.38.29"]},
  {id:15,diff:"루키",map:"빌리지 운하",times:["1.20.29","1.21.29","1.22.29","1.23.49","1.24.79","1.26.29","1.27.79","1.29.29"]}
];

let selections = {};

function $(id){return document.getElementById(id);}
function showLoading(v){$("loadingOverlay").classList.toggle("hidden",!v);}
function setMsg(t){$("msg").textContent=t;}

function renderMaps(){
  const body=$("mapBody");
  body.innerHTML="";
  MAPS.forEach(r=>{
    const tr=document.createElement("tr");
    tr.className = "row-" + String(r.diff).toLowerCase().replace("루키","rookie");
    const diff=document.createElement("td");
    diff.innerHTML=`<span class="diff-badge diff-${r.diff}">${r.diff}</span>`;
    tr.appendChild(diff);
    const map=document.createElement("td");
    map.innerHTML=`<span class="map">${r.map}</span>`;
    tr.appendChild(map);
    TIERS.forEach((tier,i)=>{
      const td=document.createElement("td");
      const b=document.createElement("button");
      b.type="button";
      b.className="chip";
      b.dataset.rowId=String(r.id);
      b.dataset.tier=tier;
      b.textContent=r.times[i] || "";
      if(!r.times[i]) b.classList.add("disabled");
      b.addEventListener("click",()=>selectTier(r.id,r.map,tier,r.times[i]));
      td.appendChild(b);
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
  refreshSelected();
}

function selectTier(rowId,map,tier,time){
  const key=String(rowId);
  if(selections[key] && selections[key].tier===tier){
    delete selections[key];
  }else{
    selections[key]={map,tier,time};
  }
  refreshSelected();
  updateRank();
}

function refreshSelected(){
  document.querySelectorAll(".chip").forEach(b=>{
    const rowId=b.dataset.rowId;
    const tier=b.dataset.tier;
    b.classList.toggle("selected",!!(selections[rowId] && selections[rowId].tier===tier));
  });
}

function calcTotal(){
  let total=0;
  Object.values(selections).forEach(v=>{
    total += Number(WEIGHTS[v.tier]||0);
  });
  return total;
}

function rankFromTotal(total){
  for(const r of RANKS){
    if(total>=r.min) return r;
  }
  return RANKS[RANKS.length-1];
}

function updateRank(){
  const total=calcTotal();
  const r=rankFromTotal(total);
  $("rankText").innerHTML = `당신은 <span class="rank-emph">${r.label.replace("군군","군")}</span> 입니다${total ? " · 점수 " + total : ""}`;
  $("meterArrow").style.setProperty("--pos", r.pos + "%");
}

function validateInput(){
  const nickname=$("nickname").value.trim();
  const pin5=$("pin5").value.trim();
  if(!nickname){alert("닉네임을 입력하세요.");return null;}
  if(!/^[0-9]{5}$/.test(pin5)){alert("비밀번호는 숫자 5자리입니다.");return null;}
  return {nickname,pin5};
}

async function saveProfile(){
  const input=validateInput();
  if(!input) return;
  const total=calcTotal();
  if(total<=0){alert("군표 기록을 하나 이상 선택하세요.");return;}
  showLoading(true);
  setMsg("저장 중입니다...");
  try{
    const {error}=await db.from("profiles").insert([{
      nickname:input.nickname,
      pin5:input.pin5,
      total:total,
      selections:selections
    }]);
    if(error) throw error;
    const r=rankFromTotal(total);
    setMsg(`저장 성공!\n닉네임: ${input.nickname}\n점수: ${total}\n군: 당신은 ${r.label}입니다`);
  }catch(err){
    setMsg("저장 실패:\n"+(err.message||String(err)));
  }finally{
    showLoading(false);
  }
}

async function loadProfile(){
  const input=validateInput();
  if(!input) return;
  showLoading(true);
  setMsg("불러오는 중입니다...");
  try{
    const {data,error}=await db
      .from("profiles")
      .select("*")
      .eq("nickname",input.nickname)
      .eq("pin5",input.pin5)
      .order("id",{ascending:false})
      .limit(1);
    if(error) throw error;
    if(!data || data.length===0){
      setMsg("일치하는 군표가 없습니다.");
      return;
    }
    const prof=data[0];
    selections=prof.selections||{};
    refreshSelected();
    updateRank();
    const total=Number(prof.total)||calcTotal();
    const r=rankFromTotal(total);
    setMsg(`불러오기 성공!\n닉네임: ${prof.nickname}\n점수: ${total}\n군: 당신은 ${r.label}입니다`);
  }catch(err){
    setMsg("불러오기 실패:\n"+(err.message||String(err)));
  }finally{
    showLoading(false);
  }
}

function resetAll(){
  if(!confirm("선택한 군표를 초기화할까요?")) return;
  selections={};
  refreshSelected();
  updateRank();
  setMsg("선택이 초기화되었습니다.");
}

function showTab(tab){
  document.querySelectorAll(".main-tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  $("gunpyoSection").classList.toggle("hidden",tab!=="gunpyo");
  $("realSection").classList.toggle("hidden",tab!=="real");
  $("eventTournamentSection").classList.toggle("hidden",tab!=="eventTournament");
  $("promoSection").classList.toggle("hidden",tab!=="promo");
  $("qnaSection").classList.toggle("hidden",tab!=="qna");
}

document.addEventListener("DOMContentLoaded",()=>{
  renderMaps();
  updateRank();
  $("btnSave").addEventListener("click",saveProfile);
  $("btnLoad").addEventListener("click",loadProfile);
  $("btnReset").addEventListener("click",resetAll);
  $("btnShot").addEventListener("click",()=>window.print());
  $("goPcBtn").addEventListener("click",()=>document.body.classList.remove("mobile-mode"));
  $("goMobileBtn").addEventListener("click",()=>document.body.classList.add("mobile-mode"));
  document.querySelectorAll(".main-tab").forEach(b=>b.addEventListener("click",()=>showTab(b.dataset.tab)));
});
</script>
</body>
</html>
